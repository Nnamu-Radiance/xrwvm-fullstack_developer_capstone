<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <a class="navbar-brand" href="/">Best Cars</a>
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="/about/">About Us</a></li>
      <li class="nav-item active"><a class="nav-link" href="/contact/">Contact Us</a></li>
    </ul>
  </div>
</nav>
<div class="container mt-4">
  <h1>Contact Us</h1>
  <div class="row mt-4">
    <div class="col-md-6">
      <h4>Get In Touch</h4>
      <p><strong>Address:</strong> 123 Auto Drive, Chicago, IL 60601</p>
      <p><strong>Phone:</strong> +1 (312) 555-0199</p>
      <p><strong>Email:</strong> info@bestcars.com</p>
      <p><strong>Hours:</strong> Mon-Sat 9AM-7PM, Sun 11AM-5PM</p>
    </div>
    <div class="col-md-6">
      <h4>Send Us a Message</h4>
      <div class="form-group">
        <input type="text" class="form-control mb-2" placeholder="Your Name">
        <input type="email" class="form-control mb-2" placeholder="Your Email">
        <textarea class="form-control mb-2" rows="4" placeholder="Your Message"></textarea>
        <button class="btn btn-primary">Send Message</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
